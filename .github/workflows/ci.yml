name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
      - name: Typecheck TypeScript and TSX
        run: npm run typecheck
      - name: Lint TypeScript and TSX
        run: npm run lint
      - name: Test legacy and React projects
        run: npm test
      - name: Build production entries
        run: npm run build
        env:
          # Non-secret placeholder so the client bundle initializes at build.
          VITE_FIREBASE_PROJECT_ID: demo-khatma
