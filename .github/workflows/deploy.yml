name: Deploy app and Firestore rules

on:
  push:
    branches: [main]
  workflow_dispatch:

# Least-privilege permissions required by the Pages deployment.
permissions:
  contents: read
  pages: write
  id-token: write

# Keep the frontend and its Firestore rules in one serialized production release.
concurrency:
  group: production
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
      - name: Build
        run: npm run build
        env:
          # Base path for a GitHub Pages *project* site (https://<user>.github.io/<repo>/).
          # Change to match your repo name, or delete for a user/custom-domain site.
          BASE_PATH: /CollectiveKhatma/
          VITE_USE_EMULATOR: 'false'
          # Firebase web config (not secret, but kept in repo secrets for tidiness).
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy-rules:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check Google Cloud deployment configuration
        env:
          WIF_PROVIDER: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          WIF_SERVICE_ACCOUNT: ${{ vars.GCP_SERVICE_ACCOUNT }}
        run: |
          if [ -z "$WIF_PROVIDER" ]; then
            echo "::error::Missing repository variable GCP_WORKLOAD_IDENTITY_PROVIDER"
            exit 1
          fi
          if [ -z "$WIF_SERVICE_ACCOUNT" ]; then
            echo "::error::Missing repository variable GCP_SERVICE_ACCOUNT"
            exit 1
          fi
      - uses: google-github-actions/auth@v3
        with:
          project_id: collectivekhatma
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT }}
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
      - name: Deploy Firestore rules
        run: npm run deploy:rules

  deploy:
    needs: [build, deploy-rules]
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
